<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Semantic HTML Example</title>

<style>
body {
    font-family: Arial, sans-serif;
    margin: 20px;
}

header, nav, main, section, article, aside, footer {
    border: 1px solid #333;
    padding: 15px;
    margin: 10px 0;
}

header {
    background: lightblue;
}

nav {
    background: lightgray;
}

.container {
    display: flex;
    gap: 20px;
}

article {
    flex: 3;
}

aside {
    flex: 1;
    background: #f4f4f4;
}

footer {
    background: lightblue;
    text-align: center;
}
</style>
</head>

<body>

<header>
    <h1>My Website</h1>
</header>

<nav>
    Home | About | Services | Contact
</nav>

<main>
    <div class="container">

        <section>
            <article>
                <h2>Welcome</h2>
                <p>
                    This is an example of semantic HTML. Semantic tags
                    make your webpage easier to understand for browsers,
                    search engines, and screen readers.
                </p>
            </article>
        </section>

        <aside>
            <h3>Related Links</h3>
            <ul>
                <li>HTML</li>
                <li>CSS</li>
                <li>JavaScript</li>
            </ul>
        </aside>

    </div>
</main>

<footer>
    &copy; 2026 My Website
</footer>

</body>
</html>
